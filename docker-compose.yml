services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - redis-network
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s
  #redis-insight
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis-insight-data:/data
    networks:
      - redis-network
    depends_on:
      - redis

  db:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./frontend:/app
      - /app/node_modules

  auth:
    build:
      context: ./auth-backend
      dockerfile: Dockerfile
    container_name: auth-Linkedin
    restart: always
    ports:
      - "3003:3003"
    depends_on:
      - db
    environment:
      PORT: ${PORT3}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME3}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_HOST: "redis-server"
      REDIS_PORT: "6379"
    volumes:
      - ./auth-backend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-Linkedin
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      PORT: ${PORT1}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ./backend:/app
      - /app/node_modules

  notifications:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: notifications-Linkedin
    restart: always
    ports:
      - "3004:3004"
    depends_on:
      - db
    environment:
      PORT: ${PORT4}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME4}
      RABBITMQ_URL: ${RABBITMQ_URL}
    volumes:
      - ./notifications:/app
      - /app/node_modules

  messaging:
    build: 
      context: ./messaging
      dockerfile: Dockerfile
    container_name: messaging-Linkedin
    restart: always
    ports:
     - "3005:3005"
    depends_on:
      - db
    environment:
      PORT: ${PORT5}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME5}
      RABBITMQ_URL: ${RABBITMQ_URL}
    volumes:
      - ./messaging:/app
      - /app/node_modules

  post-backend:
    build:
      context: ./post-backend
      dockerfile: Dockerfile
    container_name: post-backend-Linkedin
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - db
    environment:
      PORT: ${PORT2}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME2: ${DB_NAME2}
      RABBITMQ_URL: ${RABBITMQ_URL}
    volumes:
      - ./post-backend:/app
      - /app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    container_name: nest-pgadmin4new
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
  pgadmin-data:
  redis-data:
    driver: local
  redis-insight-data:
    driver: local

networks:
  redis-network:
    driver: bridge